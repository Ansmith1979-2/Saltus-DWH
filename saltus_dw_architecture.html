// Renders the official Microsoft SVG icon at the requested size
function AzureIcon({ type, size = 18 }) {
  const svc = AZ_SERVICES[type];
  if (!svc) return null;
  return <img src={svc.icon} width={size} height={size} style={{objectFit:'contain', display:'block'}} alt={svc.name}/>;
}

// ── AzBadge: small Azure service chip for node cards ─────────────────────────
function AzBadge({ type, inline = false }) {
  const svc = AZ_SERVICES[type];
  if (!svc) return null;
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: `${svc.color}18`,
      border: `1px solid ${svc.color}55`,
      borderRadius: 4, padding: inline ? '2px 6px' : '3px 7px',
      marginTop: inline ? 0 : 6,
    }}>
      <AzureIcon type={type} size={inline ? 12 : 13}/>
      <span style={{
        fontSize: inline ? 9 : 9.5, fontWeight: 600, color: svc.color,
        textTransform: 'uppercase', letterSpacing: 0.6, whiteSpace: 'nowrap',
        fontFamily: "'Montserrat', sans-serif",
      }}>{svc.abbr}</span>
    </div>
  );
}

// ── NodeLogo ──────────────────────────────────────────────────────────────────
function NodeLogo({ node, dim }) {
  const [failed, setFailed] = useState(false);
  const url = node.logo ? LOGOS[node.logo] : null;

  // Image logo (Mabel square, Hubwise wide)
  if (url && !failed) {
    const isSquare = node.logo === 'mabel';
    return (
      <img src={url} onError={() => setFailed(true)}
        style={{
          height: isSquare ? 36 : 26, width: isSquare ? 36 : 'auto',
          maxWidth: 120, objectFit: 'contain', marginBottom: 6,
          opacity: dim ? 0.35 : 0.88, transition: 'opacity 0.2s',
        }} alt={node.label}/>
    );
  }

  // Styled text monogram for source systems with no logo (e.g. CURO)
  if (node.layer === 'source') {
    const c = LC[node.layer];
    return (
      <div style={{
        fontSize: 13, fontWeight: 800, letterSpacing: 2,
        color: dim ? `${c}44` : c,
        marginBottom: 6, textTransform: 'uppercase',
        fontFamily: "'Montserrat', sans-serif",
        transition: 'color 0.2s',
      }}>{node.label}</div>
    );
  }

  return <div style={{fontSize:20, marginBottom:6, opacity: dim ? 0.3 : 1}}>{node.icon}</div>;
}

// ── ConnLine ──────────────────────────────────────────────────────────────────
// horizontal=true : Bronze <-> V&R connections (left/right, same layer row)
//   feedback=false : Bronze → V&R  (from.right → to.left), slightly above centre
//   feedback=true  : V&R → Bronze  (from.left → to.right), slightly below centre, amber
// horizontal=false: all other vertical connections (top/bottom, layer to layer)
function ConnLine({ from, to, highlighted, dimmed, label, idx, onHover, onLeave, feedback, horizontal }) {
  if (!from || !to) return null;

  let d;
  if (horizontal) {
    // S-curve running left/right. Offset vertically by ±8px to separate forward/feedback.
    const yOff = feedback ? 8 : -8;
    if (feedback) {
      // V&R (right side) → Bronze (left side): right-to-left
      const x1 = from.left  - 2,  y1 = from.cy + yOff;
      const x2 = to.right   + 2,  y2 = to.cy   + yOff;
      const mx = (x1 + x2) / 2;
      d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    } else {
      // Bronze (left side) → V&R (right side): left-to-right
      const x1 = from.right + 2,  y1 = from.cy + yOff;
      const x2 = to.left    - 2,  y2 = to.cy   + yOff;
      const mx = (x1 + x2) / 2;
      d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    }
  } else {
    // Vertical S-curve (normal top-to-bottom flow)
    const x1 = from.cx, y1 = from.bottom + 2;
    const x2 = to.cx,   y2 = to.top - 2;
    const my = (y1 + y2) / 2;
    d = `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
  }

  const feedbackColour = '#f59e0b';  // amber, matches bronze layer colour
  const defaultStroke  = feedback ? `${feedbackColour}55` : 'rgba(0,120,212,0.3)';
  const hlStroke       = feedback ? feedbackColour : B.azCyan;
  const stroke = highlighted ? hlStroke : dimmed ? 'rgba(220,232,245,0.05)' : defaultStroke;
  const sw     = highlighted ? 2.5 : 1.5;
  const dash   = highlighted ? undefined : feedback ? '3 5' : '5 4';

  return (
    <g>
      <path d={d} fill="none" stroke={stroke} strokeWidth={sw}
        strokeDasharray={dash}
        style={{transition:'stroke 0.25s, stroke-width 0.2s'}}/>
      {highlighted && (
        <circle r="4" fill={hlStroke} opacity="0.9">
          <animateMotion dur={feedback ? '1.8s' : '1.4s'} repeatCount="indefinite" path={d}/>
        </circle>
      )}
      <path d={d} fill="none" stroke="transparent" strokeWidth="14"
        style={{cursor:'pointer', pointerEvents:'stroke'}}
        onMouseEnter={e => onHover(idx, label, e)}
        onMouseLeave={onLeave}/>
    </g>
  );
}

      }}>
      <NodeLogo node={node} dim={dimmed}/>
      <div style={{fontSize:12, fontWeight:700, color: active ? '#fff' : B.text, letterSpacing:0.3}}>{node.label}</div>
      <div style={{fontSize:9.5, fontWeight:500, color:c, opacity:0.85, marginTop:3, textTransform:'uppercase', letterSpacing:0.8}}>{node.sub}</div>
      {(node.azSvcs || (node.azSvc ? [node.azSvc] : [])).length > 0 && (
        <div style={{marginTop:7, display:'flex', flexWrap:'wrap', gap:3, justifyContent:'center'}}>
          {(node.azSvcs || [node.azSvc]).map(t => <AzBadge key={t} type={t} inline/>)}
        </div>
      )}
    </div>
  );
}

// ── Detail Panel ──────────────────────────────────────────────────────────────
function DetailPanel({ node, onClose }) {
  if (!node) return (
    <div style={{padding:32, textAlign:'center', color:'rgba(220,232,245,0.2)', marginTop:80}}>
      <div style={{fontSize:36, marginBottom:14, opacity:0.4}}>←</div>
      <div style={{fontSize:12, fontWeight:500, letterSpacing:0.3}}>Click any node to<br/>view details</div>
    </div>
  );

  const c = LC[node.layer];
  const layerNames = {source:'Source System', bronze:'Bronze Layer', silver:'Silver Layer', gold:'Gold Layer', consumer:'Consumer'};
  const svc = node.azSvc ? AZ_SERVICES[node.azSvc] : null;
  const svcs = node.azSvcs ? node.azSvcs.map(t => AZ_SERVICES[t]).filter(Boolean) : (svc ? [svc] : []);
  const svcTypes = node.azSvcs || (node.azSvc ? [node.azSvc] : []);

  return (
    <div style={{padding:22}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
        <div style={{flex:1}}>
          <div style={{fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:2, color:B.azBlue, marginBottom:8}}>
            {layerNames[node.layer]}
          </div>
          {node.logo && LOGOS[node.logo]
            ? <img src={LOGOS[node.logo]}
                style={{height: node.logo==='mabel' ? 42 : 28, maxWidth:160, objectFit:'contain', marginBottom:8, display:'block'}}
                onError={e => { e.target.style.display='none'; }}
                alt={node.label}/>
            : node.layer === 'source'
              ? <div style={{fontSize:20, fontWeight:800, letterSpacing:3, color:LC[node.layer],
                  marginBottom:8, textTransform:'uppercase', fontFamily:"'Montserrat',sans-serif"}}>{node.label}</div>
              : <div style={{fontSize:24, marginBottom:8}}>{node.icon}</div>
          }
          <div style={{fontSize:18, fontWeight:700, color:'#fff', letterSpacing:0.2}}>{node.label}</div>
          <div style={{fontSize:10, fontWeight:600, color:c, textTransform:'uppercase', letterSpacing:1, marginTop:3}}>{node.sub}</div>
        </div>
        <button onClick={onClose}
          style={{background:'none', border:`1px solid rgba(0,120,212,0.35)`, borderRadius:6,
            color:'rgba(220,232,245,0.45)', cursor:'pointer', fontSize:14, lineHeight:1,
            padding:'5px 8px', marginLeft:10, fontFamily:"'Montserrat',sans-serif"}}>✕</button>
      </div>

      {/* Azure service block(s) */}
      {svcs.length > 0 && (
        <div style={{display:'flex', flexDirection:'column', gap:6, marginBottom:18}}>
          {svcs.map((s, si) => (
            <div key={si} style={{
              display:'flex', alignItems:'center', gap:10,
              background:`${s.color}12`, border:`1px solid ${s.color}44`,
              borderRadius:8, padding:'10px 12px',
            }}>
              <AzureIcon type={svcTypes[si]} size={26}/>
              <div>
                <div style={{fontSize:11, fontWeight:700, color:s.color}}>{s.name}</div>
                <div style={{fontSize:10, color:'rgba(220,232,245,0.5)', marginTop:2}}>{s.abbr}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{height:1, background:`linear-gradient(90deg, ${B.azBlue}88, transparent)`, marginBottom:18}}/>

      <Sec title="Description">
        <p style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400}}>{node.desc}</p>
      </Sec>

      {node.capabilities && (
        <Sec title="Capabilities">
          <ul style={{margin:0, paddingLeft:16, listStyle:'disc'}}>
            {node.capabilities.map((cap, i) => (
              <li key={i} style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400, marginBottom:2}}>{cap}</li>
            ))}
          </ul>
        </Sec>
      )}

      {node.outputs && (
        <Sec title="Outputs">
          <ul style={{margin:0, paddingLeft:16, listStyle:'disc'}}>
            {node.outputs.map((out, i) => (
              <li key={i} style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400, marginBottom:2}}>{out}</li>
            ))}
          </ul>
        </Sec>
      )}

      {node.attrs && node.attrs.length > 0 && (
        <Sec title="Attributes & Fields">
          <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
            {node.attrs.map(a => (
              <span key={a} style={{
                background:'rgba(0,120,212,0.12)', border:'1px solid rgba(0,120,212,0.25)',
                borderRadius:4, padding:'2px 8px', fontSize:10.5, fontFamily:'monospace',
                color:'rgba(220,232,245,0.85)',
              }}>{a}</span>
            ))}
          </div>
        </Sec>
      )}

      <Sec title="Integration & Azure Services">
        {node.integration.split('\n\n').map((para, i) => (
          <p key={i} style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400, marginBottom: i < node.integration.split('\n\n').length-1 ? 10 : 0}}>{para}</p>
        ))}
      </Sec>

      {node.triggerType && (
        <Sec title="Trigger Type">
          <p style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400}}>{node.triggerType}</p>
        </Sec>
      )}

      {node.details && node.details.map(({title,text,items},di) => (
        <Sec key={di} title={title}>
          {text
            ? <p style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400}}>{text}</p>
            : <ul style={{margin:0, paddingLeft:16, listStyle:'disc'}}>
                {items.map((item,ii) => <li key={ii} style={{fontSize:12.5, lineHeight:1.8, color:'rgba(220,232,245,0.82)', fontWeight:400, marginBottom:2}}>{item}</li>)}
              </ul>
          }
        </Sec>
      ))}

      {node.eg && (
        <Sec title="Example Payload">
          <pre style={{
            background:'#030c14', borderRadius:8, padding:14,
            fontFamily:"'Courier New',monospace", fontSize:11, color:'#7dd3f8',
            border:'1px solid rgba(0,120,212,0.15)',
            overflowX:'auto', whiteSpace:'pre', lineHeight:1.65, margin:0,
          }}>{node.eg}</pre>
        </Sec>
      )}
    </div>
  );
}

function Sec({title, children}) {
  return (
    <div style={{marginBottom:18}}>
      <div style={{fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:1.8,
        color:'rgba(0,120,212,0.7)', marginBottom:8}}>{title}</div>
      {children}
    </div>
  );
}

function Pill({label, value}) {
  return (
    <div style={{flex:1, background:'rgba(0,120,212,0.1)', border:'1px solid rgba(0,120,212,0.25)',
      borderRadius:8, padding:'9px 11px'}}>
      <div style={{fontSize:9, color:B.azBlue, fontWeight:700, textTransform:'uppercase',
        letterSpacing:0.8, marginBottom:4}}>{label}</div>
      <div style={{fontSize:11, color:'rgba(220,232,245,0.8)', lineHeight:1.45, fontWeight:500}}>{value}</div>
    </div>
  );
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function Tooltip({text, x, y}) {
  if (!text) return null;
  return (
    <div style={{
      position:'fixed', left:x+16, top:y-10,
      background:B.saltus, border:'1px solid rgba(0,120,212,0.4)',
      borderRadius:8, padding:'8px 13px', fontSize:11.5, color:B.text,
      pointerEvents:'none', zIndex:9999, boxShadow:'0 6px 28px rgba(0,0,0,0.7)',
      maxWidth:240, fontFamily:"'Montserrat',sans-serif", fontWeight:500,
    }}>
      <div style={{fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:1.5,
        color:B.azCyan, marginBottom:4}}>Azure Data Flow</div>
      {text}
    </div>
  );
}

// ── Saltus logo in header ─────────────────────────────────────────────────────
function SaltusLogo() {
  const [failed, setFailed] = useState(false);
  if (!failed) return (
    // URL is a 400x400 square icon, displayed at 92x92 in the 104px header
    <img src={LOGOS.saltus} onError={() => setFailed(true)}
      style={{height:92, width:92, objectFit:'contain', borderRadius:6}} alt="Saltus"/>
  );
  return (
    <div style={{fontSize:17, fontWeight:800, letterSpacing:3, color:'#fff',
      textTransform:'uppercase', fontFamily:"'Montserrat',sans-serif"}}>SALTUS</div>
  );
}

// ── Azure stack summary strip ─────────────────────────────────────────────────
function AzureStack() {
  const stack = [
    { type:'adls',    label:'ADLS Gen2' },
    { type:'adf',     label:'Data Factory' },
    { type:'fn',      label:'Functions' },
    { type:'synapse', label:'Synapse Analytics' },
  ];
  return (
    <div style={{display:'flex', gap:8, marginLeft:'auto', alignItems:'center', flexWrap:'wrap'}}>
      {stack.map(({ type, label }) => {
        const svc = AZ_SERVICES[type];
        return (
          <div key={type} style={{
            display:'flex', alignItems:'center', gap:5,
            background:`${svc.color}18`, border:`1px solid ${svc.color}44`,
            borderRadius:5, padding:'4px 9px',
          }}>
            <AzureIcon type={type} size={14}/>
            <span style={{fontSize:10, fontWeight:600, color:svc.color,
              fontFamily:"'Montserrat',sans-serif", whiteSpace:'nowrap'}}>{label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [sel,   setSel]   = useState(null);
  const [hNode, setHNode] = useState(null);
  const [hConn, setHConn] = useState(null);
  const [tip,   setTip]   = useState(null);
  const [pos,   setPos]   = useState({});
  const refs = useRef({});
  const wrap = useRef(null);

  const updatePos = useCallback(() => {
    if (!wrap.current) return;
    const cr = wrap.current.getBoundingClientRect();
    const p  = {};
    Object.entries(refs.current).forEach(([id, el]) => {
      if (!el) return;
      const r = el.getBoundingClientRect();
      const top    = r.top    - cr.top;
      const left   = r.left   - cr.left;
      const bottom = top  + r.height;
      const right  = left + r.width;
      p[id] = { cx: left + r.width/2, cy: top + r.height/2, top, bottom, left, right };
    });
    setPos(p);
  }, []);

  useEffect(() => {
    updatePos();
    window.addEventListener('resize', updatePos);
    return () => window.removeEventListener('resize', updatePos);
  }, [updatePos]);

  const { hlNodes, hlConns } = useMemo(() => {
    if (!hNode && hConn === null) return { hlNodes: new Set(), hlConns: new Set() };
    const hlN = new Set(), hlC = new Set();
    if (hNode) {
      hlN.add(hNode);
      CONNS.forEach((c,i) => { if (c.f===hNode||c.t===hNode) { hlC.add(i); hlN.add(c.f); hlN.add(c.t); } });
    }
    if (hConn !== null) {
      hlC.add(hConn);
      const cc = CONNS[hConn];
      if (cc) { hlN.add(cc.f); hlN.add(cc.t); }
    }
    return { hlNodes: hlN, hlConns: hlC };
  }, [hNode, hConn]);

  const hasHover = hNode || hConn !== null;

  const svgH = useMemo(() => {
    if (!Object.keys(pos).length) return 1400;
    return Math.max(...Object.values(pos).map(p => p.bottom)) + 80;
  }, [pos]);

  const onConnHover = useCallback((i, lbl, e) => { setHConn(i); setTip({text:lbl, x:e.clientX, y:e.clientY}); }, []);
  const onConnLeave = useCallback(() => { setHConn(null); setTip(null); }, []);

  return (
    <div style={{display:'flex', height:'100vh', background:B.bg, color:B.text,
      fontFamily:"'Montserrat', -apple-system, sans-serif"}}>

      {/* ── Main diagram ── */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0}}>

        {/* ── Header ── */}
        <div style={{
          padding:'0 22px', background:B.saltus,
          borderBottom:'1px solid rgba(0,120,212,0.3)',
          display:'flex', alignItems:'center', gap:0, flexShrink:0, height:104,
        }}>
          <div style={{display:'flex', alignItems:'center', gap:12, minWidth:160}}>
            <SaltusLogo/>
          </div>
          <div style={{width:1, height:28, background:'rgba(0,120,212,0.4)', margin:'0 18px'}}/>
          <div>
            <div style={{fontSize:13, fontWeight:700, color:'#fff', letterSpacing:0.3}}>Data Warehouse Architecture</div>
            <div style={{fontSize:10, color:'rgba(220,232,245,0.38)', marginTop:1, fontWeight:400, letterSpacing:0.2}}>
              Azure Medallion Architecture: Interactive Lineage Map
            </div>
          </div>
          <AzureStack/>
        </div>

        {/* ── Layer legend + instruction ── */}
        <div style={{
          padding:'7px 22px', background:'rgba(13,30,48,0.7)',
          borderBottom:'1px solid rgba(0,120,212,0.1)',
          display:'flex', alignItems:'center', gap:16, flexShrink:0, flexWrap:'wrap',
        }}>
          {[['#3b82f6','Sources'],['#f59e0b','Bronze'],['#94a3b8','Silver'],['#eab308','Gold'],['#8b5cf6','Data Marts'],['#22c55e','Consumers']].map(([c,l]) => (
            <div key={l} style={{display:'flex', alignItems:'center', gap:5, fontSize:10.5, fontWeight:500}}>
              <div style={{width:8, height:8, borderRadius:'50%', background:c}}/>
              <span style={{color:'rgba(220,232,245,0.45)'}}>{l}</span>
            </div>
          ))}
          <div style={{fontSize:10.5, color:'rgba(220,232,245,0.25)', fontWeight:400, marginLeft:'auto'}}>
            Hover to trace · Click for Azure details
          </div>
        </div>

        {/* ── Scrollable diagram ── */}
        <div style={{flex:1, overflow:'auto', padding:'28px 36px 48px'}}>
          <div ref={wrap} style={{position:'relative', minWidth:900}}>

            {/* SVG connections */}
            <svg style={{position:'absolute', top:0, left:0, width:'100%', overflow:'visible', pointerEvents:'none'}}
              height={svgH}>
              {CONNS.map((c,i) => (
                <ConnLine key={i} idx={i}
                  from={pos[c.f]} to={pos[c.t]}
                  highlighted={hlConns.has(i)}
                  dimmed={hasHover && !hlConns.has(i)}
                  label={c.lbl}
                  feedback={!!c.feedback}
                  horizontal={!!c.horizontal}
                  onHover={onConnHover}
                  onLeave={onConnLeave}/>
              ))}
            </svg>

            {/* Layers */}
            {LAYERS.map((layer, li) => (
              <div key={layer.key} style={{marginBottom: li < LAYERS.length-1 ? 72 : 0}}>
                <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:14}}>
                  <div style={{flex:1, height:1, background:`linear-gradient(90deg, transparent, ${LC[layer.key]}44)`}}/>
                  <div style={{
                    fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:2.5,
                    color:LC[layer.key], whiteSpace:'nowrap', padding:'4px 14px',
                    border:`1px solid ${LC[layer.key]}44`, borderRadius:20,
                    background:`${LC[layer.key]}0e`,
                  }}>{layer.label}</div>
                  <div style={{flex:1, height:1, background:`linear-gradient(90deg, ${LC[layer.key]}44, transparent)`}}/>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:0}}>
                  {/* Main rows */}
                  <div style={{flex:1}}>
                    {layer.rows.map((rowIds, ri) => (
                      <div key={ri} style={{marginBottom: ri < layer.rows.length - 1 ? 22 : 0}}>
                        {layer.rowLabels && layer.rowLabels[ri] && (
                          <div style={{
                            fontSize:8, fontWeight:700, textTransform:'uppercase', letterSpacing:2,
                            color:`${LC[layer.key]}99`, marginBottom:8, textAlign:'center',
                            borderBottom:`1px solid ${LC[layer.key]}22`, paddingBottom:6,
                          }}>{layer.rowLabels[ri]}</div>
                        )}
                      <div style={{
                        display:'flex', justifyContent:'center', gap:14, flexWrap:'wrap',
                      }}>
                        {rowIds.map(id => {
                          const node = NODES[id];
                          const hl = hlNodes.has(id);
                          const dm = hasHover && !hl;
                          return (
                            <NodeCard key={id} node={node}
                              selected={sel?.id===id} highlighted={hl} dimmed={dm}
                              onClick={setSel} onEnter={setHNode}
                              onLeave={() => setHNode(null)}
                              nodeRef={el => refs.current[id]=el}/>
                          );
                        })}
                      </div>
                      </div>
                    ))}
                  </div>

                  {/* Sidebar V&R node */}
                  {layer.sidebar && (() => {
                    const sid  = layer.sidebar;
                    const node = NODES[sid];
                    const hl   = hlNodes.has(sid);
                    const dm   = hasHover && !hl;
                    return (
                      <div style={{display:'flex', alignItems:'center', gap:0, flexShrink:0}}>
                        {/* Divider with label */}
                        <div style={{
                          width:1, alignSelf:'stretch', background:`${LC[layer.key]}33`,
                          margin:'0 18px', position:'relative', flexShrink:0,
                        }}>
                          <div style={{
                            position:'absolute', top:'50%', left:'50%',
                            transform:'translate(-50%,-50%) rotate(-90deg)',
                            fontSize:8, fontWeight:700, textTransform:'uppercase',
                            letterSpacing:1.5, color:`${LC[layer.key]}88`,
                            whiteSpace:'nowrap', pointerEvents:'none',
                          }}>V&amp;R</div>
                        </div>
                        <NodeCard node={node}
                          selected={sel?.id===sid} highlighted={hl} dimmed={dm}
                          onClick={setSel} onEnter={setHNode}
                          onLeave={() => setHNode(null)}
                          nodeRef={el => refs.current[sid]=el}/>
                      </div>
                    );
                  })()}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Detail panel ── */}
      <div style={{
        width:375, background:B.panel,
        borderLeft:'1px solid rgba(0,120,212,0.15)',
        overflowY:'auto', flexShrink:0,
      }}>
        <div style={{height:3, background:`linear-gradient(90deg, ${B.azBlue}, ${B.azCyan}, transparent)`}}/>
        <DetailPanel node={sel} onClose={() => setSel(null)}/>
      </div>

      {tip && <Tooltip text={tip.text} x={tip.x} y={tip.y}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
